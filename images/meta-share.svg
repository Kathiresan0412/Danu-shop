<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Logo Circle -->
  <circle cx="200" cy="315" r="120" fill="white" opacity="0.95"/>
  
  <!-- Shopping Bag in Circle -->
  <g transform="translate(200, 315)">
    <path d="M -30 -20 L -25 -50 Q -25 -58 -18 -58 L 18 -58 Q 25 -58 25 -50 L 30 -20" fill="none" stroke="#667eea" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -32 -20 L -25 40 Q -25 50 -18 50 L 18 50 Q 25 50 25 40 L 32 -20" fill="#667eea" opacity="0.15" stroke="#667eea" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -18 -58 Q -18 -80 0 -80 Q 18 -80 18 -58" fill="none" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Main Text -->
  <text x="600" y="250" text-anchor="middle" font-size="96" font-weight="bold" fill="white" font-family="Arial, sans-serif">
    Danu Multi Shop
  </text>
  
  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-size="48" fill="white" opacity="0.95" font-family="Arial, sans-serif">
    Fresh Groceries at Affordable Prices
  </text>
  
  <!-- Location -->
  <text x="600" y="420" text-anchor="middle" font-size="36" fill="white" opacity="0.85" font-family="Arial, sans-serif">
    📍 Mallavi, Sri Lanka
  </text>
  
  <!-- Bottom Banner -->
  <rect x="0" y="500" width="1200" height="130" fill="white" opacity="0.1"/>
  <text x="600" y="575" text-anchor="middle" font-size="32" fill="white" font-weight="bold" font-family="Arial, sans-serif">
    🥬 Fresh Vegetables • 🍎 Fruits • 🛒 Daily Essentials
  </text>
</svg>